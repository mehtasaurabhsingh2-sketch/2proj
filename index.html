<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <div class="header-content">
            <h1>📊 Dashboard</h1>
            <button id="refreshBtn" class="refresh-btn">🔄 Refresh Data</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Loading Indicator -->
        <div id="loadingMessage" class="loading-message" style="display: none;">
            ⏳ Loading data...
        </div>

        <!-- Cards Container -->
        <div class="cards-grid">
            
            <!-- Card 1: Bitcoin Price -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Bitcoin Price</h2>
                </div>
                <div class="card-body">
                    <div class="card-value" id="bitcoinPrice">-</div>
                    <div class="card-description" id="bitcoinDesc">Fetching data...</div>
                </div>
            </div>

            <!-- Card 2: Ethereum Price -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Ethereum Price</h2>
                </div>
                <div class="card-body">
                    <div class="card-value" id="ethereumPrice">-</div>
                    <div class="card-description" id="ethereumDesc">Fetching data...</div>
                </div>
            </div>

            <!-- Card 3: Random User -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Random User</h2>
                </div>
                <div class="card-body">
                    <div class="card-value" id="userName">-</div>
                    <div class="card-description" id="userEmail">Fetching data...</div>
                </div>
            </div>

            <!-- Card 4: Fun Fact -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Fun Fact</h2>
                </div>
                <div class="card-body">
                    <div class="card-value fact-icon">💡</div>
                    <div class="card-description" id="factText">Fetching data...</div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>Interactive Dashboard | Built with HTML, CSS & JavaScript</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
